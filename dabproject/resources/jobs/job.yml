resources:
  jobs:
    injetion_job:
      name: injetion_job
      tasks:
        - task_key: ingestion
          notebook_task:
            notebook_path: ../../src/notebook/ingestion.ipynb
            base_parameters:
              catalog_name: ${var.catalog_name}
            source: WORKSPACE
      queue:
        enabled: true
      performance_target: PERFORMANCE_OPTIMIZED
